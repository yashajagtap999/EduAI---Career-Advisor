<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI | User Profile</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="page-fade-in">

    <div class="dashboard-wrapper">
        
        <!-- Sidebar Navigation Container -->
        <div id="sidebar-container"></div>

        <!-- Main Workspace -->
        <main class="main-content">
            
            <!-- Page Header -->
            <header class="dash-header">
                <div class="dash-title-area">
                    <h1>👤 User Profile</h1>
                    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-weight: 500;">Manage your academic details, preferences, and workspace settings.</p>
                </div>
            </header>

            <!-- Profile Info Grid -->
            <section class="grid-2" style="margin-bottom: 32px;">
                <!-- Personal Info Card -->
                <div class="glass-card">
                    <h3 style="margin-bottom: 24px;"><i class="fa-solid fa-id-card" style="color: var(--primary-blue); margin-right: 8px;"></i> Account Details</h3>
                    <div style="display: flex; flex-direction: column; gap: 16px; font-size: 14.5px;">
                        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
                            <span style="font-weight: 700; color: var(--text-primary);">Full Name</span>
                            <span id="profile-fullname">--</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
                            <span style="font-weight: 700; color: var(--text-primary);">Username</span>
                            <span id="profile-username">--</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding-bottom: 4px;">
                            <span style="font-weight: 700; color: var(--text-primary);">Target Career Role</span>
                            <span id="profile-target-role" class="list-item-badge badge-green" style="font-weight: bold; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">--</span>
                        </div>
                    </div>
                </div>

                <!-- Theme / Preferences Setting Card -->
                <div class="glass-card">
                    <h3 style="margin-bottom: 24px;"><i class="fa-solid fa-sliders" style="color: var(--accent-purple); margin-right: 8px;"></i> Platform Settings</h3>
                    
                    <div style="margin-bottom: 24px;">
                        <label class="form-label" style="margin-bottom: 12px;">Select Theme Theme</label>
                        <div style="display: flex; gap: 12px;">
                            <button id="theme-light-btn" class="btn-primary" style="flex: 1; justify-content: center; padding: 10px; font-size: 13.5px;"><i class="fa-solid fa-sun"></i> Light Theme</button>
                            <button id="theme-dark-btn" class="btn-secondary" style="flex: 1; justify-content: center; padding: 10px; font-size: 13.5px; box-shadow: none;"><i class="fa-solid fa-moon"></i> Dark Theme</button>
                        </div>
                    </div>
                    
                    <div style="border-top: 1px solid var(--border-color); padding-top: 18px; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-info-circle"></i>
                        <span>Glow animations are optimized for your browser theme settings.</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/animation.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const fullNameEl = document.getElementById('profile-fullname');
            const usernameEl = document.getElementById('profile-username');
            const targetRoleEl = document.getElementById('profile-target-role');

            const lightBtn = document.getElementById('theme-light-btn');
            const darkBtn = document.getElementById('theme-dark-btn');

            // 1. Populate details from localStorage/API
            fullNameEl.textContent = localStorage.getItem('full_name') || 'Student';
            usernameEl.textContent = `@${localStorage.getItem('username') || 'user'}`;

            try {
                const stats = await Api.getStats();
                targetRoleEl.textContent = stats.predicted_role;
            } catch(e) {
                targetRoleEl.textContent = 'Not Predicted';
            }

            // 2. Set theme buttons styling on load
            const currentTheme = localStorage.getItem('theme') || 'light';
            toggleThemeButtons(currentTheme);

            // 3. Bind click events
            lightBtn.addEventListener('click', () => {
                setTheme('light');
            });
            darkBtn.addEventListener('click', () => {
                setTheme('dark');
            });

            function setTheme(theme) {
                localStorage.setItem('theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
                toggleThemeButtons(theme);
            }

            function toggleThemeButtons(theme) {
                if (theme === 'light') {
                    lightBtn.className = 'btn-primary';
                    darkBtn.className = 'btn-secondary';
                    darkBtn.style.boxShadow = 'none';
                } else {
                    lightBtn.className = 'btn-secondary';
                    lightBtn.style.boxShadow = 'none';
                    darkBtn.className = 'btn-primary';
                }
            }
        });
    </script>
</body>
</html>
