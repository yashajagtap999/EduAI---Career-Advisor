<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI | AI Mentor Chat</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .chat-messages {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .chat-bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 14.5px;
            white-space: pre-line; /* preserves formatting of prompt categories */
        }
        
        .bubble-user {
            background: var(--primary-gradient);
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bubble-assistant {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chat-input-wrapper {
            position: relative;
            flex-grow: 1;
        }
        
        .chat-input-field {
            width: 100%;
            padding: 14px 48px 14px 18px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            transition: var(--transition);
        }
        
        .chat-input-field:focus {
            border-color: var(--primary-blue);
            background-color: var(--bg-primary);
        }
        
        .send-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--primary-blue);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .send-btn:hover {
            color: var(--accent-purple);
            transform: translateY(-50%) scale(1.1);
        }

        .typing-indicator {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 18px;
            background-color: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 600;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="page-fade-in">

    <div class="dashboard-wrapper">
        
        <!-- Sidebar Navigation Container -->
        <div id="sidebar-container"></div>

        <!-- Main Workspace -->
        <main class="main-content">
            
            <!-- Chat Header -->
            <header class="dash-header" style="margin-bottom: 24px;">
                <div class="dash-title-area">
                    <h1>🧠 AI Career Mentor</h1>
                    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-weight: 500;">Ask about career roadmaps, resume feedback, coding concepts, or target projects.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <!-- Floating Quick Info Panels -->
                    <button class="btn-secondary" id="history-popover-btn" style="padding: 10px 16px; font-size: 13px;"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
                    <button class="btn-secondary" id="insights-popover-btn" style="padding: 10px 16px; font-size: 13px;"><i class="fa-solid fa-lightbulb"></i> Profile Insights</button>
                </div>
            </header>

            <!-- Quick Action Prompts Grid -->
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;">
                <button class="btn-secondary quick-action-btn" data-prompt="Generate Career Roadmap" style="font-size: 13px; justify-content: center; padding: 12px;"><i class="fa-solid fa-map-location-dot" style="color: var(--primary-blue);"></i> Career Roadmap</button>
                <button class="btn-secondary quick-action-btn" data-prompt="Review My Resume" style="font-size: 13px; justify-content: center; padding: 12px;"><i class="fa-solid fa-file-shield" style="color: var(--accent-purple);"></i> Resume Review</button>
                <button class="btn-secondary quick-action-btn" data-prompt="Suggest Projects" style="font-size: 13px; justify-content: center; padding: 12px;"><i class="fa-solid fa-diagram-project" style="color: var(--success);"></i> Suggest Projects</button>
                <button class="btn-secondary quick-action-btn" data-prompt="Mock Interview" style="font-size: 13px; justify-content: center; padding: 12px;"><i class="fa-solid fa-microphone-lines" style="color: var(--danger);"></i> Mock Interview</button>
            </div>

            <!-- Chat Room Layout -->
            <div class="chat-layout">
                <!-- Message Display List -->
                <div class="chat-messages" id="chat-messages-container">
                    <div class="chat-bubble bubble-assistant">
                        👋 Hi! I'm your AI Career Mentor. I'm ready to help you analyze your skills, suggest projects, and recommend the best career paths. Ask me anything!
                    </div>
                </div>

                <!-- Typing indicator -->
                <div id="typing-indicator" class="typing-indicator" style="display: none; margin: 0 24px 20px 24px;">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <span style="margin-left: 6px; color: var(--text-muted);">EduAI is thinking...</span>
                </div>

                <!-- Input area -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <input type="text" class="chat-input-field" id="chat-user-input" placeholder="Ask about placements, roadmaps, technical requirements...">
                        <button class="send-btn" id="chat-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/animation.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messagesContainer = document.getElementById('chat-messages-container');
            const inputField = document.getElementById('chat-user-input');
            const sendBtn = document.getElementById('chat-send-btn');
            const typingIndicator = document.getElementById('typing-indicator');
            const quickActionButtons = document.querySelectorAll('.quick-action-btn');

            let chatHistory = []; // Local history tracking in memory

            // 1. Submit message helper
            async function submitMessage(text) {
                if (!text.trim()) return;

                // Render User bubble
                appendBubble('user', text);
                inputField.value = '';

                // Add to history
                chatHistory.push({ role: 'user', content: text });

                // Show typing indicator
                typingIndicator.style.display = 'flex';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                // Formatter to render bold/italic markdown safely
                function formatMessageContent(txt) {
                    if (!txt) return '';
                    return txt
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/g, '<em>$1</em>');
                }

                // Create assistant placeholder bubble for streaming response
                const assistantBubble = appendBubble('assistant', '');
                let streamContent = '';

                try {
                    // Call backend SSE API
                    await Api.streamChat(text, chatHistory, 
                        // onChunk
                        (chunk) => {
                            typingIndicator.style.display = 'none'; // hide once chunks load
                            streamContent += chunk;
                            assistantBubble.innerHTML = formatMessageContent(streamContent);
                            messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        },
                        // onError
                        (err) => {
                            typingIndicator.style.display = 'none';
                            assistantBubble.innerHTML = `<span style="color: var(--danger);">⚠️ Error generating response: ${err.message}</span>`;
                        },
                        // onDone
                        () => {
                            chatHistory.push({ role: 'assistant', content: streamContent });
                            messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        }
                    );
                } catch (e) {
                    typingIndicator.style.display = 'none';
                    assistantBubble.innerHTML = `<span style="color: var(--danger);">⚠️ Connection error: ${e.message}</span>`;
                }
            }

            function appendBubble(role, text) {
                const div = document.createElement('div');
                div.className = `chat-bubble bubble-${role}`;
                
                // Formatter helper reference
                function formatMessageContent(txt) {
                    if (!txt) return '';
                    return txt
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/g, '<em>$1</em>');
                }
                
                div.innerHTML = formatMessageContent(text);
                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                return div;
            }

            // Click send handlers
            sendBtn.addEventListener('click', () => submitMessage(inputField.value));
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitMessage(inputField.value);
            });

            // Quick actions click handlers
            quickActionButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    submitMessage(btn.getAttribute('data-prompt'));
                });
            });

            // Inline popover popups
            const historyBtn = document.getElementById('history-popover-btn');
            const insightsBtn = document.getElementById('insights-popover-btn');

            historyBtn.addEventListener('click', () => {
                alert('Recent Conversations:\n- 💬 AIML Roadmap\n- 📄 Resume Review\n- 💻 AI Projects\n- 🏢 Internship Guide');
            });
            
            insightsBtn.addEventListener('click', async () => {
                try {
                    const stats = await Api.getStats();
                    if (stats.has_scan) {
                        alert(`Profile Insights:\n- Target Role: ${stats.predicted_role}\n- Readiness: ${stats.readiness}%\n- Skills: ${stats.skills.slice(0, 5).join(', ')}`);
                    } else {
                        alert('No profile scan details. Please upload your resume in the Resume X-Ray tab.');
                    }
                } catch(e) {
                    alert('Error loading profile context.');
                }
            });
        });
    </script>
</body>
</html>
